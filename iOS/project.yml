name: Oilchangelog
options:
  bundleIdPrefix: com.shimondeitel.oilchangelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Oilchangelog:
    type: application
    platform: iOS
    sources:
      - path: Oilchangelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.oilchangelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Oilchangelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OilchangelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OilchangelogTests
      - path: Oilchangelog.storekit
    dependencies:
      - target: Oilchangelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.oilchangelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OilchangelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OilchangelogUITests
    dependencies:
      - target: Oilchangelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.oilchangelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Oilchangelog:
    build:
      targets:
        Oilchangelog: all
        OilchangelogTests: [test]
        OilchangelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Oilchangelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Oilchangelog.storekit
      targets:
        - OilchangelogTests
        - OilchangelogUITests
    archive:
      config: Release
